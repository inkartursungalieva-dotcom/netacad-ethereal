services:
  - type: web
    name: netacad-ethereal-inkar
    plan: free
    env: python
    buildCommand: "./build.sh"
    startCommand: "python setup_cloud.py && gunicorn config.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.10"
      - key: ALLOWED_HOSTS
        value: "*"
      # Пароль приложения Gmail — задать в Dashboard Render (сброс пароля, рассылка)
      - key: EMAIL_HOST_PASSWORD
        sync: false
