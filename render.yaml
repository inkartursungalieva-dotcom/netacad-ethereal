services:
  - type: web
    name: netacad-ethereal-inkar
    plan: free
    env: python
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate --noinput && python fix_site.py && gunicorn config.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.10"
      - key: ALLOWED_HOSTS
        value: "*"
