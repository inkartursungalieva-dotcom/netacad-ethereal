databases:
  - name: netacad_db
    plan: free

services:
  - type: web
    name: netacad-ethereal-inkar
    plan: free
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: netacad_db
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: ALLOWED_HOSTS
        value: ".render.com,localhost,127.0.0.1"
