{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "Рассылка студентам" %} - NetAcademy{% endblock %}

{% block content %}
<div class="flex pt-16 min-h-screen bg-surface">
    {% include 'includes/sidebar.html' %}

    <main class="lg:ml-64 flex-1 p-8">
        <div class="max-w-2xl mx-auto">
            <div class="mb-8 flex items-center gap-4">
                <a href="{% url 'dashboard:teacher_index' %}" class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface hover:bg-surface-container-highest transition-all">
                    <span class="material-symbols-outlined">arrow_back</span>
                </a>
                <h2 class="text-3xl font-extrabold font-headline text-on-surface">{% trans "Рассылка студентам" %}</h2>
            </div>

            <div class="bg-surface-container-lowest p-8 rounded-2xl shadow-lg border border-outline-variant/10">
                <form method="post" class="space-y-6">
                    {% csrf_token %}
                    
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-on-surface-variant uppercase tracking-wider" for="subject">
                            {% trans "Тема сообщения" %}
                        </label>
                        <input type="text" name="subject" id="subject" required
                               class="w-full px-5 py-4 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 transition-all text-on-surface"
                               placeholder="{% trans 'Например: Обновление материалов курса' %}">
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-bold text-on-surface-variant uppercase tracking-wider" for="message">
                            {% trans "Текст сообщения" %}
                        </label>
                        <textarea name="message" id="message" rows="8" required
                                  class="w-full px-5 py-4 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 transition-all text-on-surface"
                                  placeholder="{% trans 'Введите текст сообщения для всех студентов...' %}"></textarea>
                    </div>

                    <div class="pt-4">
                        <button type="submit" class="w-full py-4 bg-primary text-on-primary font-bold rounded-xl shadow-lg hover:shadow-xl hover:scale-[1.01] transition-all flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined">send</span>
                            {% trans "Отправить всем студентам" %}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
{% endblock %}
